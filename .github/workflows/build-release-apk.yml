name: Build Release APK

on:
  push:
    tags:
      - 'v*' # Trigger build on release version tags (e.g., v1.0, v1.0.0)
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  build:
    name: Build Production Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # Highly recommended distribution for Android builds
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Configure Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Decoding release keystore from secrets..."
            echo "$KEYSTORE_BASE64" | base64 --decode > my-upload-key.jks
          else
            echo "No custom release keystore secret configured yet."
            echo "Generating a fallback signing key to ensure the release builds successfully..."
            keytool -genkey -v -keystore my-upload-key.jks -alias upload -keyalg RSA -keysize 2048 -validity 10000 -storepass "android" -keypass "android" -dname "CN=RoutineReminders, OU=Production, O=aistudio, C=US"
          fi

      - name: Build Production Release APK
        env:
          KEYSTORE_PATH: "my-upload-key.jks"
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD || 'android' }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}
        run: gradle assembleRelease --stacktrace

      - name: Upload Release APK Archive
        uses: actions/upload-artifact@v4
        with:
          name: routine-reminders-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
          retention-days: 30
